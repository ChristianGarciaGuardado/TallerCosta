<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costa Mecánica Integral</title>
    <link rel="icon" type="image/png" href="/static/Isotipo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #1F3864;
            --navy-light: #2a4d84;
            --amber: #E8A838;
            --gray-100: #F8F9FA;
            --white: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --red: #C00000;
            --red-light: #FCE4D6;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--gray-100);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
        }

        /* Encabezado con la identidad del taller */
        .login-header {
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Esto fuerza a que la imagen se mueva al centro perfecto */
        }

        .login-logo {
            background: var(--navy);
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            font-size: 32px;
            box-shadow: 0 2px 4px rgba(31, 56, 100, 0.2);
        }

        .login-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 0.5px;
        }

        .login-header p {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Alertas de error de Flask */
        .alert {
            background-color: var(--red-light);
            color: var(--red);
            border: 1px solid rgba(192, 0, 0, 0.2);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Estructura del Formulario */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: var(--text-light);
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text);
            background-color: var(--white);
            transition: border-color 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--navy);
        }

        /* Botón de ingreso */
        .btn-submit {
            background-color: var(--navy);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.15s ease;
        }

        .btn-submit:hover {
            background-color: var(--navy-light);
        }

        .btn-submit:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="login-header">
            <img src="/static/Logo.png" alt="Logo Costa" style="width: 250px; height: px; object-fit: contain; margin-bottom: 12px; border-radius: 6px;">
            
        </div>

        {% if error %}
        <div class="alert">
            <i class="ti ti-alert-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="password">Contraseña del Sistema</label>
                <div class="input-wrapper">
                    <i class="ti ti-lock"></i>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingresá la clave de acceso" 
                        required 
                        autofocus
                    >
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <span>Ingresar al Taller</span>
                <i class="ti ti-arrow-right"></i>
            </button>
        </form>

    </div>

</body>
</html>
